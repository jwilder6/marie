<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─────────────────────────────────────────────────────────────────────────────
// Constants & helpers
// ─────────────────────────────────────────────────────────────────────────────
const VERSION    = 'v2.7';
const ALPHA      = 0.04;
const THRESH     = 0.6;   // bubble / level display threshold (°)
const RISE_NOISE = 0.20;  // exact-mode noise floor (inches)

const fmtDeg = v =>
  (Math.abs(v) < 0.05 ? '+0.0' : (v >= 0 ? '+' : '') + v.toFixed(1)) + '°';

function fmtRise(inches, inc) {
  const dec = inc === 0 ? 2 : inc === 0.5 ? 1 : 0;
  if (inches <= 0) return (0).toFixed(dec);
  if (inc > 0) {
    if (inches < inc * 0.5) return (0).toFixed(dec);
    return (Math.ceil(inches / inc) * inc).toFixed(dec);
  }
  return inches.toFixed(dec);
}

// ─────────────────────────────────────────────────────────────────────────────
// Persistent storage — localStorage + cookie fallback (Brave Android)
// ─────────────────────────────────────────────────────────────────────────────
function storeSet(key, val) {
  try { localStorage.setItem(key, val); } catch (_) {}
  try {
    const exp = new Date(Date.now() + 315_360_000_000).toUTCString();
    document.cookie = `${key}=${val};expires=${exp};path=/;SameSite=Lax`;
  } catch (_) {}
}
function storeGet(key) {
  try { const v = localStorage.getItem(key); if (v !== null) return v; } catch (_) {}
  try {
    const m = document.cookie.match('(?:^|; )' + key + '=([^;]*)');
    if (m) return decodeURIComponent(m[1]);
  } catch (_) {}
  return null;
}

// ─────────────────────────────────────────────────────────────────────────────
// SVG tick marks for bubble arena
// ─────────────────────────────────────────────────────────────────────────────
function ArenaSVG({ size }) {
  const cx = size / 2, cy = size / 2, r1 = size / 2 - 4;
  const ringR = [size * 0.153, size * 0.288, size * 0.407];
  const ticks = Array.from({ length: 72 }, (_, i) => {
    const a = i * 5 * Math.PI / 180;
    const maj = i % 9 === 0, med = i % 3 === 0;
    const len = maj ? size * 0.076 : med ? size * 0.042 : size * 0.025;
    const r0 = r1 - len;
    return { x1: cx+r0*Math.sin(a), y1: cy-r0*Math.cos(a),
             x2: cx+r1*Math.sin(a), y2: cy-r1*Math.cos(a), maj };
  });
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}
         style={{ position:'absolute', inset:0, pointerEvents:'none' }}>
      {ringR.map((r,i) =>
        <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke="#1d3050" strokeWidth="1"/>)}
      <line x1={4} y1={cy} x2={size-4} y2={cy}   stroke="#1d3050" strokeWidth="1"/>
      <line x1={cx} y1={4} x2={cx} y2={size-4}   stroke="#1d3050" strokeWidth="1"/>
      {ticks.map((t,i) =>
        <line key={i} x1={t.x1} y1={t.y1} x2={t.x2} y2={t.y2}
              stroke={t.maj ? '#3a5535' : '#1d3050'}
              strokeWidth={t.maj ? 2 : 1}/>)}
    </svg>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// Permission / welcome screen
// ─────────────────────────────────────────────────────────────────────────────
function PermScreen({ onBoot }) {

    <div className="fixed inset-0 bg-bg z-50 flex flex-col items-center justify-center

        <span className="font-mono font-normal text-dim text-sm tracking-normal ml-2">{VERSION}</span>

      <p className="text-muted text-sm leading-relaxed max-w-xs">
        Lay your phone flat on the van floor — the accelerometer measures tilt and pitch

      </p>

        <rect x="71" y="16" width="78" height="20"  rx="7" fill="#1a2d48" stroke="#1d3050" strokeWidth="1"/>
        <rect x="71" y="160" width="78" height="8"  rx="3" fill="#1a2d48" stroke="#1d3050" strokeWidth="1"/>
        {[22,163].map(y => [55,149].map(x =>
          <rect key={`${x}${y}`} x={x} y={y} width="16" height="11" rx="2" fill="#2a3a50"/>
        ))}
        <line x1="55" y1="27"  x2="71"  y2="27"  stroke="#1d3050" strokeWidth="1"/>
        <line x1="149" y1="27" x2="165" y2="27"  stroke="#1d3050" strokeWidth="1"/>
        <line x1="55" y1="168" x2="71"  y2="168" stroke="#1d3050" strokeWidth="1"/>
        <line x1="149" y1="168" x2="165" y2="168" stroke="#1d3050" strokeWidth="1"/>
        {/* Phone */}
        <rect x="91" y="50" width="38" height="62" rx="5" fill="#0b1120" stroke="#e8c84a" strokeWidth="1.5"/>
        <rect x="101" y="50" width="12" height="3.5" rx="1.5" fill="#e8c84a"/>
        <rect x="94" y="56" width="32" height="52" rx="3" fill="#121c30"/>

        <text x="110" y="115" textAnchor="middle"

        <text x="110" y="10" textAnchor="middle"

        <line x1="110" y1="12" x2="110" y2="16" stroke="#e8c84a" strokeWidth="1.5" markerEnd="url(#arr)"/>
        <text x="110" y="197" textAnchor="middle"
              fontFamily="SF Mono,Menlo,monospace" fontSize="9" fill="#5a7898" letterSpacing="2">REAR</text>
        <text x="30" y="100" textAnchor="middle"
              fontFamily="SF Mono,Menlo,monospace" fontSize="8" fill="#5a7898"
              transform="rotate(-90,30,100)">DRIVER</text>
      </svg>

      <p className="font-mono text-xs text-muted leading-relaxed max-w-xs">
        Phone <span className="text-gold font-semibold">face up</span>
        {' · '}
        <span className="text-gold font-semibold">top toward front of van</span>
        {' · '}
        <span className="text-gold font-semibold">left side to driver's door</span>
      </p>

      <button onClick={onBoot}
        className="w-full max-w-xs py-4 rounded-2xl font-disp font-black
                   text-base tracking-wider uppercase bg-gold text-bg"
        style={{ boxShadow:'0 0 24px rgba(232,200,74,.32)' }}>
        Enable Sensors
      </button>

      <p className="text-dim text-xs leading-relaxed max-w-xs">
        iOS will show a motion prompt — tap <strong className="text-muted">Allow</strong>.<br/>
        Works fully offline after first load.
      </p>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// Calibrate confirmation modal
// ─────────────────────────────────────────────────────────────────────────────
function CalModal({ onConfirm, onCancel }) {
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-7"
         style={{ background:'rgba(0,0,0,.72)' }}>
      <div className="bg-panel rounded-3xl p-6 w-full max-w-sm flex flex-col gap-4"
           style={{ border:'1px solid #e8c84a', boxShadow:'0 0 40px rgba(232,200,74,.2)' }}>
        <h3 className="font-disp font-bold text-xl text-gold">Calibrate? Really?</h3>
        <p className="text-sm text-muted leading-relaxed">
          Phone must be on a <strong className="text-ink">perfectly flat surface</strong>.<br/>
          This zeroes tilt and pitch at the current position and saves the setting.
        </p>
        <div className="flex gap-3 mt-1">
          <button onClick={onCancel}
            className="flex-1 py-3 rounded-2xl font-mono text-sm uppercase tracking-wide text-muted"
            style={{ border:'1px solid #1d3050', background:'transparent' }}>
            Cancel
          </button>
          <button onClick={onConfirm}
            className="flex-1 py-3 rounded-2xl font-mono font-bold text-sm
                       uppercase tracking-wide bg-gold text-bg">
            Yes, Calibrate
          </button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// Help screen
// ─────────────────────────────────────────────────────────────────────────────
function HelpScreen({ onClose }) {
  const Section = ({ title, children }) => (
    <div className="flex flex-col gap-2">
      <h3 className="font-mono text-xs tracking-widest uppercase text-gold
                     border-b border-rim pb-1.5">{title}</h3>
      <div className="flex flex-col gap-1.5">{children}</div>
    </div>
  );
  const P = ({ children }) => (
    <p className="text-sm text-muted leading-relaxed">{children}</p>
  );
  const B = ({ children }) => <strong className="text-ink font-semibold">{children}</strong>;

  return (
    <div className="fixed inset-0 z-40 bg-bg flex flex-col overflow-hidden">
      <div className="flex items-center justify-between px-5 py-3 border-b border-rim flex-shrink-0">
        <h2 className="font-disp font-bold text-lg text-gold tracking-wide">BuffyLevel Help</h2>
        <button onClick={onClose}
          className="bg-gold text-bg font-mono font-bold text-xs px-4 py-2
                     rounded-xl tracking-wider">✕ Close</button>
      </div>
      <div className="flex-1 overflow-y-auto">
        <div className="flex flex-col gap-5 px-5 py-5 pb-6">

          <Section title="Phone Placement">
            <P>Place your phone <B>face up</B> on the van floor with the <B>top of the phone
              pointing toward the front of the van</B> and the <B>left side toward the driver's
              door</B>. The app reads tilt (side-to-side) and pitch (front-to-back) from the
              accelerometer.</P>
          </Section>

          <Section title="Reading the Results">
            <P><strong className="text-ok">Green wheel</strong> — stays on the ground, no rise needed.</P>
            <P><strong className="text-warn">Yellow wheel</strong> — moderate rise required.</P>
            <P><strong className="text-hi">Red wheel</strong> — needs the most rise.</P>
            <P>Drive or back onto blocks or ramps under the yellow and red wheels until all
               four read green.</P>
          </Section>

          <Section title="Buttons">
            <P><B>Freeze</B> — locks the current reading so you can move the phone while keeping
               the numbers visible. Tap Resume to continue live updates.</P>
            <P><B>Calibrate</B> — corrects for tilt introduced by your phone's camera lens bump
               or phone case, which prevent the phone from lying perfectly flat. Place the phone
               on a <B>known flat surface</B> such as a table or countertop, tap Calibrate and
               confirm. The setting is saved and persists across sessions — only redo it if you
               change cases.</P>
            <P><B>Help</B> — shows this help screen.</P>
          </Section>

          <Section title="Rise Display">
            <P><B>Exact</B> — shows rise to the nearest hundredth of an inch.</P>
            <P><B>½″</B> — rounds up to the nearest half inch, useful if your leveling blocks
               come in ½″ increments.</P>
            <P><B>1″</B> — rounds up to the nearest whole inch.</P>
          </Section>

          <Section title="Wheel Dimensions">
            <P><B>Wheelbase</B> — distance between front and rear axles in inches.
               Default is 159″.</P>
            <P><B>Track width</B> — distance between left and right wheel centres in inches.
               Default is 71″.</P>
            <P>Both defaults are set for the Winnebago Travato.</P>
          </Section>

          <Section title="Tips">
            <P><B>Add to Home Screen:</B> In Safari tap Share → Add to Home Screen.
               The app works offline after the first load.</P>
            <P><B>Numbers seem backwards?</B> Your phone may be rotated 180°. Make sure
               the top of the phone points toward the front of the van, then tap Calibrate.</P>
          </Section>

          <button onClick={onClose}
            className="w-full py-4 rounded-2xl font-mono font-bold text-sm
                       tracking-widest uppercase text-gold"
            style={{ border:'1px solid #e8c84a', background:'transparent', marginTop:4 }}>
            ✕ Close Help
          </button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// Wheel card
// ─────────────────────────────────────────────────────────────────────────────
const CARD_STATES = {
  zero: { bg:'#091a10', border:'#163526', bar:'#3dffa0', rise:'#3dffa0',
          lbl:'#5ab890', glow:'0 0 10px rgba(61,255,160,.4)' },
  low:  { bg:'#1c1608', border:'#352c0a', bar:'#ffb340', rise:'#ffb340',
          lbl:'#c09050', glow:'none' },
  high: { bg:'#1f0b0b', border:'#380f0f', bar:'#ff4f4f', rise:'#ff5252',
          lbl:'#c07070', glow:'0 0 10px rgba(255,79,79,.4)' },
};

const LABELS = { FL:'Front Left', FR:'Front Right', RL:'Rear Left', RR:'Rear Right' };

function WheelCard({ id, rise, inc }) {
  const displayed = parseFloat(fmtRise(rise, inc));
  const isZero  = displayed < 0.005;
  const riseRaw = rise;
  // state determined by displayed inches only
  const state = isZero ? 'zero' : 'other'; // 'other' handled by caller
  return null;
}

// ─────────────────────────────────────────────────────────────────────────────
// Main App
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  // Screen
  const [screen, setScreen] = useState('perm'); // perm | main | denied

  // Sensor values (refs for event handler, state for render)
  const smT  = useRef(0), smP = useRef(0);
  const rawG = useRef(0), rawB = useRef(0);
  const calT = useRef(parseFloat(storeGet('bl_calT') || '0'));
  const calP = useRef(parseFloat(storeGet('bl_calP') || '0'));
  const liveRef = useRef(false);
  const heldRef = useRef(false);

  const [tilt,  setTilt]  = useState(0);
  const [pitch, setPitch] = useState(0);
  const [live,  setLive]  = useState(false);
  const [held,  setHeld]  = useState(false);

  // UI
  const [showHelp,    setShowHelp]    = useState(false);
  const [showCal,     setShowCal]     = useState(false);
  const [calOk,       setCalOk]       = useState(false);
  const [inc,         setInc]         = useState(0);  // 0 | 0.5 | 1
  const [wb,          setWb]          = useState(159);
  const [tw,          setTw]          = useState(71);

  // Keep heldRef in sync
  useEffect(() => { heldRef.current = held; }, [held]);

  // Sensor handler (stable ref)
  const onOrient = useCallback(e => {
    if (e.beta === null && e.gamma === null) return;
    if (!liveRef.current) { liveRef.current = true; setLive(true); }
    if (heldRef.current) return;
    rawG.current = e.gamma ?? 0;
    rawB.current = e.beta  ?? 0;
    const rt = -rawG.current - calT.current;
    const rp = -rawB.current - calP.current;
    smT.current += ALPHA * (rt - smT.current);
    smP.current += ALPHA * (rp - smP.current);
    setTilt(+smT.current.toFixed(2));
    setPitch(+smP.current.toFixed(2));
  }, []);

  const attach = useCallback(() => {
    window.addEventListener('deviceorientation', onOrient, true);
    setTimeout(() => { if (!liveRef.current) setScreen('nosensor'); }, 3500);
  }, [onOrient]);

  const boot = useCallback(() => {
    setScreen('main');
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission()
        .then(s => { if (s === 'granted') attach(); else setScreen('denied'); })
        .catch(() => attach());
    } else {
      attach();
    }
  }, [attach]);

  function doCalibrate() {
    setShowCal(false);
    calT.current = -rawG.current;
    calP.current = -rawB.current;
    storeSet('bl_calT', calT.current);
    storeSet('bl_calP', calP.current);
    smT.current = 0; smP.current = 0;
    setTilt(0); setPitch(0);
    setHeld(false); heldRef.current = false;
    setCalOk(true);
    setTimeout(() => setCalOk(false), 1600);
  }

  // ── Wheel math ────────────────────────────────────────────────────────────
  const t = tilt, p = pitch;
  const isLevel = Math.abs(t) < THRESH && Math.abs(p) < THRESH;
  const tp = Math.tan(t * Math.PI / 180);
  const pp = Math.tan(p * Math.PI / 180);
  const h = {
    FL:  (wb/2)*pp + (tw/2)*tp,
    FR:  (wb/2)*pp - (tw/2)*tp,
    RL: -(wb/2)*pp + (tw/2)*tp,
    RR: -(wb/2)*pp - (tw/2)*tp,
  };
  const minH = Math.min(...Object.values(h));
  const span = Math.max(...Object.values(h)) - minH || 1;

  const wheels = ['FL','FR','RL','RR'].map(k => {
    const riseRaw = h[k] - minH;
    const rise    = riseRaw < RISE_NOISE ? 0 : riseRaw;
    const disp    = parseFloat(fmtRise(rise, inc));
    const frac    = riseRaw / span;
    // Card color driven by displayed inches only
    const state   = disp < 0.005 ? 'zero' : frac < 0.55 ? 'low' : 'high';
    return { k, rise, disp, state };
  });

  // ── Bubble position ───────────────────────────────────────────────────────
  const arenaSize = 118;
  const aCtr = arenaSize / 2;
  const MAX  = aCtr - 14;
  const SC   = aCtr / 26;
  const bx   = Math.max(-MAX, Math.min(MAX,  t * SC));
  const by   = Math.max(-MAX, Math.min(MAX,  p * SC));

  // ── Screens ───────────────────────────────────────────────────────────────
  if (screen === 'perm')     return <PermScreen onBoot={boot}/>;
  if (screen === 'denied')   return (
    <div className="fixed inset-0 bg-bg flex flex-col items-center justify-center
                    gap-5 p-8 text-center">
      <div className="text-4xl">🔒</div>
      <p className="text-warn font-disp font-bold text-xl">Motion Access Denied</p>
      <p className="text-muted text-sm leading-relaxed max-w-xs">
        Go to <strong className="text-ink">Settings › Safari › Motion &amp; Orientation
        Access</strong>, enable it, then reload this page.
      </p>
    </div>
  );
  if (screen === 'nosensor') return (
    <div className="fixed inset-0 bg-bg flex flex-col items-center justify-center
                    gap-5 p-8 text-center">
      <div className="text-4xl">⚠️</div>
      <p className="text-warn font-disp font-bold text-xl">No Sensor Data</p>
      <p className="text-muted text-sm leading-relaxed max-w-xs">
        Open this URL directly in <strong className="text-ink">Safari</strong> (not
        inside another app) and tap <strong className="text-ink">Allow</strong> on the
        motion prompt.
      </p>
      <button onClick={() => setScreen('perm')}
        className="px-8 py-3 rounded-2xl font-mono text-sm uppercase tracking-wide text-gold"
        style={{ border:'1px solid #e8c84a' }}>Try Again</button>
    </div>
  );

  // ── Main UI ───────────────────────────────────────────────────────────────
  const tCol = Math.abs(t) < THRESH ? '#3dffa0' : '#e8c84a';
  const pCol = Math.abs(p) < THRESH ? '#3dffa0' : '#e8c84a';

  return (
    <>
      {showHelp && <HelpScreen onClose={() => setShowHelp(false)}/>}
      {showCal  && <CalModal onConfirm={doCalibrate} onCancel={() => setShowCal(false)}/>}

      <div className="flex flex-col bg-bg relative z-10"
           style={{ height:'100dvh', maxWidth:430, margin:'0 auto',
                    paddingBottom:'env(safe-area-inset-bottom,0px)' }}>

        {/* ── Header ── */}
        <header className="flex items-center justify-between px-5 flex-shrink-0 border-b border-rim"
                style={{ paddingTop:10, paddingBottom:8 }}>
          <div className="font-disp font-black text-xl tracking-wide text-gold"
               style={{ textShadow:'0 0 18px rgba(232,200,74,.3)' }}>
            Buffy<span className="font-light text-ink">Level</span>
            <span className="font-mono font-normal text-dim ml-2"
                  style={{ fontSize:'.6rem', letterSpacing:'.06em' }}>{VERSION}</span>
          </div>
          <div className="flex items-center gap-2">
            <span className="font-mono uppercase tracking-widest text-muted border border-rim
                             rounded-md px-2 py-0.5" style={{ fontSize:'.68rem' }}>
              {live ? 'live' : 'waiting'}
            </span>
            <div className="w-2 h-2 rounded-full transition-all duration-500"
                 style={{ background: live ? '#3dffa0' : '#6e90a8',
                          boxShadow:  live ? '0 0 8px #3dffa0' : 'none' }}/>
          </div>
        </header>

        {/* ── Angle strip ── */}
        <div className="grid bg-panel border-b border-rim flex-shrink-0"
             style={{ gridTemplateColumns:'1fr 1px 1fr' }}>
          {[['Tilt °', t, tCol],['Pitch °', p, pCol]].map(([lbl,val,col],i) => (
            <React.Fragment key={lbl}>
              {i===1 && <div style={{ background:'#1d3050' }}/>}
              <div className="flex flex-col items-center acell-pad" style={{ padding:'6px 0 5px', gap:1 }}>
                <span className="font-mono uppercase tracking-widest text-muted"
                      style={{ fontSize:'.72rem' }}>{lbl}</span>
                <span className="font-mono leading-none"
                      style={{ fontSize:'1.4rem', color:col, transition:'color .2s' }}>
                  {fmtDeg(val)}
                </span>
              </div>
            </React.Fragment>
          ))}
        </div>

        {/* ── Bubble row ── */}
        <div className="flex flex-row items-center flex-shrink-0 bwrap-pad"
             style={{ padding:'6px 10px' }}>

          {/* Left: hold badge, centred between left margin and bubble */}
          <div className="flex-1 flex items-center justify-center min-w-0">
            <div style={{
              background:'rgba(255,179,64,.15)', border:'1px solid #ffb340',
              borderRadius:10, padding:'6px 10px',
              fontFamily:'"SF Mono",Menlo,Monaco,monospace', fontSize:'.68rem',
              letterSpacing:'.07em', color:'#ffb340', textTransform:'uppercase',
              opacity: held ? 1 : 0, transition:'opacity .3s', pointerEvents:'none',
              whiteSpace:'normal', textAlign:'center', maxWidth:78, lineHeight:1.5,
            }}>❚❚ Reading Held</div>
          </div>

          {/* Bubble arena */}
          <div className="flex flex-col items-center flex-shrink-0" style={{ gap:3 }}>
            <div className="relative rounded-full flex-shrink-0 arena-wrap"
                 style={{
                   width:arenaSize, height:arenaSize,
                   background:'radial-gradient(circle at 42% 36%, #162238, #07090f)',
                   border: isLevel ? '2px solid #1a4030' : '2px solid #1d3050',
                   boxShadow: isLevel ? '0 0 20px rgba(61,255,160,.14)' : 'none',
                   transition:'border-color .4s, box-shadow .4s',
                 }}>
              <ArenaSVG size={arenaSize}/>
              {/* Bubble */}
              <div className="bub" style={{
                position:'absolute', width:28, height:28, borderRadius:'50%',
                transform:'translate(-50%,-50%)',
                left: aCtr + bx, top: aCtr + by,
                pointerEvents:'none',
                background: isLevel
                  ? 'radial-gradient(circle at 35% 30%, rgba(61,255,160,.95), rgba(0,130,70,.45))'
                  : 'radial-gradient(circle at 35% 30%, rgba(232,200,74,.95), rgba(130,90,0,.4))',
                border: `2px solid ${isLevel ? '#3dffa0' : '#e8c84a'}`,
                boxShadow: isLevel
                  ? '0 0 16px rgba(61,255,160,.65)'
                  : '0 0 10px rgba(232,200,74,.5)',
                transition:'left .1s ease-out, top .1s ease-out, background .3s, border-color .3s, box-shadow .3s',
              }}/>
            </div>
            {/* Level pill */}
            <div className="font-mono text-ok"
                 style={{
                   fontSize:'.63rem', letterSpacing:'.18em', height:13,
                   opacity: isLevel ? 1 : 0, transition:'opacity .4s',
                   animation: isLevel ? 'lvlpulse 2s ease infinite' : 'none',
                 }}>✦ &nbsp;LEVEL&nbsp; ✦</div>
          </div>

          {/* Right spacer — equal to left so bubble stays centred */}
          <div className="flex-1 min-w-0"/>
        </div>

        {/* ── Wheel dimensions ── */}
        <div className="grid gap-1.5 flex-shrink-0 dims-pad"
             style={{ gridTemplateColumns:'1fr 1fr', padding:'4px 14px' }}>
          {[['Wheelbase', wb, setWb],['Track width', tw, setTw]].map(([lbl,val,set]) => (
            <div key={lbl} className="bg-panel rounded-2xl dcard-pad"
                 style={{ border:'1px solid #1d3050', padding:'6px 10px' }}>
              <div className="font-mono uppercase tracking-wide text-muted mb-1"
                   style={{ fontSize:'.7rem' }}>{lbl}</div>
              <div className="flex items-center gap-1.5">
                <input type="number" value={val} inputMode="decimal" min="1"
                  onChange={e => set(+e.target.value || 0)}
                  className="flex-1 bg-bg text-gold font-mono text-base text-center
                             rounded-xl outline-none min-w-0 focus:border-gold"
                  style={{ border:'1px solid #1d3050', padding:'5px', width:0,
                           transition:'border-color .15s' }}/>
                <span className="text-muted" style={{ fontSize:'.7rem' }}>in</span>
              </div>
            </div>
          ))}
        </div>

        {/* ── Wheel grid ── */}
        <div className="flex flex-col flex-1 min-h-0 overflow-y-auto"
             style={{ padding:'0 14px 5px', gap:4 }}>

          {/* Rise mode selector */}
          <div className="flex items-center gap-1.5" style={{ padding:'0 2px' }}>
            <span className="font-mono text-muted whitespace-nowrap"
                  style={{ fontSize:'.68rem', letterSpacing:'.06em' }}>Show rise:</span>
            <div className="flex gap-1">
              {[['Exact',0],['½″',0.5],['1″',1]].map(([lbl,val]) => (
                <button key={lbl} onClick={() => setInc(val)}
                  className="font-mono rounded-lg cursor-pointer"
                  style={{
                    padding:'5px 13px', fontSize:'.74rem', letterSpacing:'.05em',
                    border:`1px solid ${inc===val ? '#e8c84a' : '#1d3050'}`,
                    background:'transparent',
                    color: inc===val ? '#e8c84a' : '#6e90a8',
                    transition:'border-color .1s, color .1s',
                  }}>{lbl}</button>
              ))}
            </div>
          </div>

          {/* Direction strips */}
          <div className="flex justify-between font-mono uppercase tracking-wide text-dim"
               style={{ fontSize:'.68rem', padding:'0 2px' }}>
            <span>◀ driver</span><span>↑ front</span><span>passenger ▶</span>
          </div>

          {/* 2×2 wheel cards */}
          <div className="grid flex-1" style={{ gridTemplateColumns:'1fr 1fr', gap:5 }}>
            {wheels.map(({ k, rise, disp, state }) => {
              const s = CARD_STATES[state];
              const cm = (disp * 2.54).toFixed(1);
              return (
                <div key={k} className="rounded-2xl flex flex-col items-center
                                        justify-center relative overflow-hidden wcard-pad"
                     style={{
                       background: s.bg, border:`1px solid ${s.border}`,
                       padding:'7px 6px 6px',
                       transition:'background .25s, border-color .25s',
                     }}>
                  {/* Top colour bar */}
                  <div className="absolute top-0 left-0 right-0 rounded-t-2xl"
                       style={{ height:3, background:s.bar, boxShadow:s.glow,
                                transition:'background .25s, box-shadow .25s' }}/>
                  <span className="font-mono uppercase tracking-wide mt-1"
                        style={{ fontSize:'.68rem', color:s.lbl }}>{LABELS[k]}</span>
                  <span className="font-disp font-bold leading-none wrise-text"
                        style={{ fontSize:'1.85rem', color:s.rise,
                                 transition:'color .25s' }}>
                    {fmtRise(rise, inc)}
                  </span>
                  <span className="font-mono uppercase tracking-wide"
                        style={{ fontSize:'.68rem', color:s.lbl }}>inches</span>
                  <span className="font-mono" style={{ fontSize:'.73rem', color:'#6e90a8' }}>
                    {cm} cm
                  </span>
                </div>
              );
            })}
          </div>

          <div className="flex justify-between font-mono uppercase tracking-wide text-dim"
               style={{ fontSize:'.68rem', padding:'0 2px' }}>
            <span>◀ driver</span><span>↓ rear</span><span>passenger ▶</span>
          </div>
        </div>

        {/* ── Action buttons ── */}
        <div className="flex gap-1.5 flex-shrink-0 act-pad"
             style={{ padding:'4px 14px 8px' }}>
          {[
            {
              label: held  ? '▶ Resume' : '⏸ Freeze',
              active: held,
              activeCol: '#e8c84a',
              onClick: () => setHeld(h => !h),
            },
            {
              label: calOk ? '✓ Saved'  : '⦿ Calibrate',
              active: calOk,
              activeCol: '#3dffa0',
              onClick: () => setShowCal(true),
            },
            {
              label: '? Help',
              active: false,
              activeCol: '#e8c84a',
              onClick: () => setShowHelp(true),
            },
          ].map((btn, i) => (
            <button key={i} onClick={btn.onClick}
              className="flex-1 font-mono uppercase rounded-2xl cursor-pointer act-btn"
              style={{
                background:'transparent', padding:'13px 4px', fontSize:'.74rem',
                letterSpacing:'.06em',
                border:`1px solid ${btn.active ? btn.activeCol : '#1d3050'}`,
                color: btn.active ? btn.activeCol : '#9dc0d8',
                transition:'border-color .15s, color .15s',
              }}>{btn.label}</button>
          ))}
        </div>

      </div>{/* /app shell */}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<!-- Service Worker (caches CDN deps after first load → full offline) -->
<script>
if ('serviceWorker' in navigator) {
  const sw = `
const C = 'buffylevel-v3';
const URLS = [
  '/',
  'https://cdn.tailwindcss.com',
  'https://unpkg.com/react@18/umd/react.production.min.js',
  'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
  'https://unpkg.com/@babel/standalone/babel.min.js',
];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(C).then(c => c.addAll(URLS)).catch(()=>{}));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(ks =>
    Promise.all(ks.filter(k => k !== C).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).then(res => {
      const clone = res.clone();
      caches.open(C).then(c => c.put(e.request, clone));
      return res;
    }).catch(() => caches.match('/')))
  );
});`;
  const url = URL.createObjectURL(new Blob([sw], { type:'application/javascript' }));
  navigator.serviceWorker.register(url, { scope:'/' })
    .then(() => URL.revokeObjectURL(url)).catch(() => {});
}

// Home screen icon (canvas-drawn, no external image needed)
(function buildIcon() {
  const SZ = 512, cv = document.createElement('canvas');
  cv.width = cv.height = SZ;
  const ctx = cv.getContext('2d'), cx = SZ/2, cy = SZ/2;
  const R = SZ * 0.18;
  ctx.beginPath();
  ctx.moveTo(R,0); ctx.lineTo(SZ-R,0); ctx.quadraticCurveTo(SZ,0,SZ,R);
  ctx.lineTo(SZ,SZ-R); ctx.quadraticCurveTo(SZ,SZ,SZ-R,SZ);
  ctx.lineTo(R,SZ); ctx.quadraticCurveTo(0,SZ,0,SZ-R);
  ctx.lineTo(0,R); ctx.quadraticCurveTo(0,0,R,0); ctx.closePath();
  ctx.fillStyle = '#0b1120'; ctx.fill();
  // Dot grid
  ctx.fillStyle = 'rgba(232,200,74,.06)';
  for (let x=22;x<SZ;x+=22) for (let y=22;y<SZ;y+=22) {
    ctx.beginPath(); ctx.arc(x,y,1.5,0,Math.PI*2); ctx.fill();
  }
  const rR = SZ * 0.38;
  ctx.beginPath(); ctx.arc(cx,cy,rR,0,Math.PI*2);
  ctx.strokeStyle='#1d3050'; ctx.lineWidth=6; ctx.stroke();
  [0.22,0.14].forEach(f => {
    ctx.beginPath(); ctx.arc(cx,cy,SZ*f,0,Math.PI*2);
    ctx.strokeStyle='#1d3050'; ctx.lineWidth=3; ctx.stroke();
  });
  ctx.strokeStyle='#1d3050'; ctx.lineWidth=3;
  [[cx-rR,cy,cx+rR,cy],[cx,cy-rR,cx,cy+rR]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  });
  for (let i=0;i<72;i++) {
    const a=i*5*Math.PI/180, maj=i%9===0, med=i%3===0;
    const len=maj?22:med?13:7, r0=rR-len;
    ctx.beginPath();
    ctx.moveTo(cx+r0*Math.sin(a),cy-r0*Math.cos(a));
    ctx.lineTo(cx+rR*Math.sin(a),cy-rR*Math.cos(a));
    ctx.strokeStyle=maj?'#3a5535':'#1d3050'; ctx.lineWidth=maj?5:2.5; ctx.stroke();
  }
  const bOff=SZ*0.09, bR=SZ*0.11;
  const bg=ctx.createRadialGradient(cx-bOff-bR*.3,cy+bOff-bR*.3,bR*.1,cx-bOff,cy+bOff,bR);
  bg.addColorStop(0,'rgba(232,200,74,1)');
  bg.addColorStop(.6,'rgba(200,160,30,.85)');
  bg.addColorStop(1,'rgba(130,90,0,.3)');
  ctx.beginPath(); ctx.arc(cx-bOff,cy+bOff,bR,0,Math.PI*2);
  ctx.fillStyle=bg; ctx.fill();
  ctx.strokeStyle='#e8c84a'; ctx.lineWidth=4; ctx.stroke();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(232,200,74,.5)'; ctx.shadowBlur=18;
  ctx.fillStyle='#e8c84a'; ctx.font=`bold ${SZ*.115}px SF Mono,Menlo,monospace`;
  ctx.fillText('BL',cx+SZ*.18,cy-SZ*.18); ctx.shadowBlur=0;
  ctx.fillStyle='rgba(100,140,170,.7)'; ctx.font=`${SZ*.062}px SF Mono,Menlo,monospace`;
  ctx.fillText('BUFFY LEVEL',cx,cy+rR*.72);
  const d = cv.toDataURL('image/png');
  document.getElementById('apple-touch-icon').href = d;
  document.getElementById('favicon').href = d;
  const mLink = document.createElement('link');
  mLink.rel = 'manifest';
  mLink.href = URL.createObjectURL(new Blob([JSON.stringify({
    name:'BuffyLevel', short_name:'BuffyLevel', start_url:'/',
    display:'standalone', background_color:'#0b1120', theme_color:'#0b1120',
    orientation:'portrait',
    icons:[{ src:d, sizes:'512x512', type:'image/png', purpose:'any maskable' }]
  })], { type:'application/manifest+json' }));
  document.head.appendChild(mLink);
})();
</script>

<body>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const VERSION='v3.1',ALPHA=0.04,THRESH=0.6,RISE_NOISE=0.20;

const fmtDeg=v=>(Math.abs(v)<0.05?'+0.0':(v>=0?'+':'')+v.toFixed(1))+'°';

function fmtRise(inches,inc){
  const dec=inc===0?2:inc===0.5?1:0;
  if(inches<=0)return(0).toFixed(dec);
  if(inc>0){if(inches<inc*0.5)return(0).toFixed(dec);return(Math.ceil(inches/inc)*inc).toFixed(dec);}
  return inches.toFixed(dec);
}

function storeSet(k,v){
  try{localStorage.setItem(k,String(v));}catch(_){}
  try{const e=new Date(Date.now()+315360000000).toUTCString();document.cookie=`${k}=${v};expires=${e};path=/;SameSite=Lax`;}catch(_){}
}
function storeGet(k){
  try{const v=localStorage.getItem(k);if(v!==null)return v;}catch(_){}
  try{const m=document.cookie.match('(?:^|; )'+k+'=([^;]*)');if(m)return decodeURIComponent(m[1]);}catch(_){}
  return null;
}

const CARD={
  zero:{bg:'#091a10',border:'#163526',bar:'#3dffa0',rise:'#3dffa0',lbl:'#5ab890',glow:'0 0 10px rgba(61,255,160,.4)'},
  low: {bg:'#1c1608',border:'#352c0a',bar:'#ffb340',rise:'#ffb340',lbl:'#c09050',glow:'none'},
  high:{bg:'#1f0b0b',border:'#380f0f',bar:'#ff4f4f',rise:'#ff5252',lbl:'#c07070',glow:'0 0 10px rgba(255,79,79,.4)'},
};
const WL={FL:'Front Left',FR:'Front Right',RL:'Rear Left',RR:'Rear Right'};

function ArenaSVG({size}){
  const cx=size/2,cy=size/2,r1=size/2-4;
  const rings=[size*.153,size*.288,size*.407];
  const ticks=Array.from({length:72},(_,i)=>{
    const a=i*5*Math.PI/180,maj=i%9===0,med=i%3===0;
    const len=maj?size*.076:med?size*.042:size*.025,r0=r1-len;
    return{x1:cx+r0*Math.sin(a),y1:cy-r0*Math.cos(a),x2:cx+r1*Math.sin(a),y2:cy-r1*Math.cos(a),maj};
  });
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}
         style={{position:'absolute',inset:0,pointerEvents:'none'}}>
      {rings.map((r,i)=><circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke="#1d3050" strokeWidth="1"/>)}
      <line x1={4} y1={cy} x2={size-4} y2={cy} stroke="#1d3050" strokeWidth="1"/>
      <line x1={cx} y1={4} x2={cx} y2={size-4} stroke="#1d3050" strokeWidth="1"/>
      {ticks.map((t,i)=><line key={i} x1={t.x1} y1={t.y1} x2={t.x2} y2={t.y2}
        stroke={t.maj?'#3a5535':'#1d3050'} strokeWidth={t.maj?2:1}/>)}
    </svg>
  );
}

  useEffect(()=>{
    const id=setInterval(()=>setAng(a=>(a+0.7)%360),30);
    return()=>clearInterval(id);
  },[]);
  // Animated bubble drifts gently in a small circle
  const bx=Math.sin(ang*Math.PI/180)*12;
  const by=Math.cos(ang*Math.PI/180)*8;
  const SZ=160, cx=SZ/2, cy=SZ/2, r1=SZ/2-4;
  const rings=[SZ*.153,SZ*.288,SZ*.407];
  const ticks=Array.from({length:72},(_,i)=>{
    const a=i*5*Math.PI/180,maj=i%9===0,med=i%3===0;
    const len=maj?SZ*.076:med?SZ*.042:SZ*.025,r0=r1-len;
    return{x1:cx+r0*Math.sin(a),y1:cy-r0*Math.cos(a),x2:cx+r1*Math.sin(a),y2:cy-r1*Math.cos(a),maj};

  return(
    <div className="fixed inset-0 bg-bg z-50 flex flex-col items-center justify-center overflow-hidden"
         style={{padding:'0 28px'}}>

      {/* Background glow */}
      <div style={{position:'absolute',top:'30%',left:'50%',transform:'translate(-50%,-50%)',
                   width:300,height:300,borderRadius:'50%',
                   background:'radial-gradient(circle, rgba(232,200,74,.06) 0%, transparent 70%)',
                   pointerEvents:'none'}}/>

      {/* Hero bubble instrument */}
      <div className="relative flex-shrink-0" style={{width:SZ,height:SZ,marginBottom:24}}>
        <div className="absolute inset-0 rounded-full"
             style={{background:'radial-gradient(circle at 38% 32%, #162238, #07090f)',
                     border:'2px solid #1d3050',
                     boxShadow:'inset 0 0 40px rgba(0,0,0,.6), 0 0 40px rgba(232,200,74,.08)'}}>
          <svg width={SZ} height={SZ} viewBox={`0 0 ${SZ} ${SZ}`}
               style={{position:'absolute',inset:0,pointerEvents:'none'}}>
            {rings.map((r,i)=><circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke="#1d3050" strokeWidth="1"/>)}
            <line x1={4} y1={cy} x2={SZ-4} y2={cy} stroke="#1d3050" strokeWidth="1"/>
            <line x1={cx} y1={4} x2={cx} y2={SZ-4} stroke="#1d3050" strokeWidth="1"/>
            {ticks.map((t,i)=><line key={i} x1={t.x1} y1={t.y1} x2={t.x2} y2={t.y2}
              stroke={t.maj?'#3a5535':'#1d3050'} strokeWidth={t.maj?2:1}/>)}
          </svg>
          {/* Animated bubble */}
          <div style={{position:'absolute',width:32,height:32,borderRadius:'50%',
                       transform:'translate(-50%,-50%)',
                       left:cx+bx,top:cy+by,
                       background:'radial-gradient(circle at 35% 30%, rgba(232,200,74,.95), rgba(130,90,0,.4))',
                       border:'2px solid #e8c84a',
                       boxShadow:'0 0 14px rgba(232,200,74,.6)',
                       transition:'left .08s ease-out, top .08s ease-out'}}/>
        </div>
      </div>

      {/* Title */}
      <h1 className="font-disp font-black text-4xl tracking-wide text-gold text-center"
          style={{textShadow:'0 0 28px rgba(232,200,74,.4)',marginBottom:6}}>
        BuffyLevel
      </h1>
      <div className="font-mono text-dim text-center" style={{fontSize:'.72rem',letterSpacing:'.2em',marginBottom:20}}>
        {VERSION} &nbsp;·&nbsp; TRAVATO VAN LEVELER
      </div>

      {/* Feature pills */}
      <div className="flex flex-col gap-2 w-full max-w-xs" style={{marginBottom:28}}>
        {[
          ['📐', 'Live accelerometer — tilt & pitch in real time'],
          ['🛞', 'Exact rise for all four wheels in inches & cm'],
          ['💾', 'Calibration saved — works offline after first load'],
        ].map(([icon,text])=>(
          <div key={text} className="flex items-center gap-3 bg-panel rounded-2xl px-4 py-3"
               style={{border:'1px solid #1d3050'}}>
            <span style={{fontSize:'1.1rem',flexShrink:0}}>{icon}</span>
            <span className="font-mono text-muted" style={{fontSize:'.72rem',lineHeight:1.5}}>{text}</span>
          </div>
        ))}
      </div>

      {/* CTA */}
      <button onClick={onNext}
        className="w-full max-w-xs py-4 rounded-2xl font-disp font-black
                   text-base tracking-wider uppercase bg-gold text-bg"
        style={{boxShadow:'0 0 28px rgba(232,200,74,.35)',marginBottom:16}}>
        Get Started →
      </button>

      <p className="font-mono text-dim text-center" style={{fontSize:'.65rem',letterSpacing:'.08em'}}>
        Winnebago Travato defaults pre-loaded
      </p>
    </div>
  );
}

  return(
    <div className="fixed inset-0 bg-bg z-50 flex flex-col items-center justify-center gap-4 overflow-y-auto text-center" style={{padding:'24px 28px'}}>
      <h1 className="font-disp font-black text-3xl tracking-wide text-gold" style={{textShadow:'0 0 24px rgba(232,200,74,.35)'}}>
        BuffyLevel<span className="font-mono font-normal text-dim text-sm tracking-normal ml-2">{VERSION}</span>
      </h1>
      <p className="text-muted text-sm leading-relaxed max-w-xs">Lay your phone flat on the van floor — the accelerometer measures tilt and pitch and calculates how much to raise each wheel.</p>
      <svg width="170" height="158" viewBox="0 0 220 200">
        <defs><marker id="arr" markerWidth="5" markerHeight="5" refX="2.5" refY="2.5" orient="auto"><polygon points="0,4 2.5,0 5,4" fill="#e8c84a"/></marker></defs>
        <rect x="71" y="16" width="78" height="168" rx="9" fill="#121c30" stroke="#1d3050" strokeWidth="2"/>
        <rect x="71" y="16" width="78" height="20" rx="7" fill="#1a2d48" stroke="#1d3050" strokeWidth="1"/>
        <rect x="71" y="160" width="78" height="8" rx="3" fill="#1a2d48" stroke="#1d3050" strokeWidth="1"/>
        {[[55,22],[55,163],[149,22],[149,163]].map(([x,y])=><rect key={`${x}${y}`} x={x} y={y} width="16" height="11" rx="2" fill="#2a3a50"/>)}
        {[[55,27,71,27],[149,27,165,27],[55,168,71,168],[149,168,165,168]].map(([x1,y1,x2,y2],i)=><line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#1d3050" strokeWidth="1"/>)}
        <rect x="91" y="50" width="38" height="62" rx="5" fill="#0b1120" stroke="#e8c84a" strokeWidth="1.5"/>

        <rect x="94" y="56" width="32" height="52" rx="3" fill="#121c30"/>
        <circle cx="110" cy="82" r="10" fill="none" stroke="#1d3050" strokeWidth="1"/>
        <circle cx="110" cy="82" r="4.5" fill="rgba(232,200,74,.9)" stroke="#e8c84a" strokeWidth="1.2"/>
        <text x="110" y="115" textAnchor="middle" fontFamily="SF Mono,Menlo,monospace" fontSize="7" fill="#8ab0cc">face up</text>

        <span className="text-gold font-semibold">top toward front of van</span>{' · '}

      </p>
      <button onClick={onBoot} className="w-full max-w-xs py-4 rounded-2xl font-disp font-black text-base tracking-wider uppercase bg-gold text-bg" style={{boxShadow:'0 0 24px rgba(232,200,74,.32)'}}>Enable Sensors</button>
      <p className="text-dim text-xs leading-relaxed max-w-xs">iOS will show a motion prompt — tap <strong className="text-muted">Allow</strong>.<br/>Works fully offline after first load.</p>
    </div>

}

function CalModal({onConfirm,onCancel}){

    <div className="fixed inset-0 z-50 flex items-center justify-center p-7" style={{background:'rgba(0,0,0,.72)'}}>
      <div className="bg-panel rounded-3xl p-6 w-full max-w-sm flex flex-col gap-4" style={{border:'1px solid #e8c84a',boxShadow:'0 0 40px rgba(232,200,74,.2)'}}>

function HelpScreen({onClose}){
  const Sec=({title,children})=>(
    <div className="flex flex-col gap-2">
      <h3 className="font-mono text-xs tracking-widest uppercase text-gold border-b border-rim pb-1.5">{title}</h3>
      <div className="flex flex-col gap-1.5">{children}</div>
    </div>
  );
  const P=({children})=><p className="text-sm text-muted leading-relaxed">{children}</p>;
  const B=({children})=><strong className="text-ink font-semibold">{children}</strong>;
  return(
    <div className="fixed inset-0 z-40 bg-bg flex flex-col overflow-hidden">
      <div className="flex items-center justify-between px-5 py-3 border-b border-rim flex-shrink-0">
        <h2 className="font-disp font-bold text-lg text-gold tracking-wide">BuffyLevel Help</h2>
        <button onClick={onClose} className="bg-gold text-bg font-mono font-bold text-xs px-4 py-2 rounded-xl tracking-wider">✕ Close</button>
      </div>
      <div className="flex-1 overflow-y-auto">
        <div className="flex flex-col gap-5 px-5 py-5 pb-6">
          <Sec title="Phone Placement">
            <P>Place your phone <B>face up</B> on the van floor with the <B>top of the phone pointing toward the front of the van</B> and the <B>left side toward the driver's door</B>. The app reads tilt (side-to-side) and pitch (front-to-back) from the accelerometer.</P>
          </Sec>
          <Sec title="Reading the Results">
            <P><strong className="text-ok">Green wheel</strong> — stays on the ground, no rise needed.</P>
            <P><strong className="text-warn">Yellow wheel</strong> — moderate rise required.</P>
            <P><strong className="text-hi">Red wheel</strong> — needs the most rise.</P>
            <P>Drive or back onto blocks or ramps under the yellow and red wheels until all four read green.</P>
          </Sec>
          <Sec title="Buttons">
            <P><B>Freeze</B> — locks the current reading so you can move the phone while keeping the numbers visible. Tap Resume to continue live updates.</P>
            <P><B>Calibrate</B> — corrects for tilt introduced by your phone's camera lens bump or phone case. Place the phone on a <B>known flat surface</B> such as a table or countertop, tap Calibrate and confirm. The setting is saved and persists across sessions — only redo it if you change cases.</P>
            <P><B>Help</B> — shows this help screen.</P>
          </Sec>
          <Sec title="Rise Display">
            <P><B>Exact</B> — shows rise to the nearest hundredth of an inch.</P>
            <P><B>½″</B> — rounds up to the nearest half inch, useful if your leveling blocks come in ½″ increments.</P>
            <P><B>1″</B> — rounds up to the nearest whole inch.</P>
          </Sec>
          <Sec title="Wheel Dimensions">
            <P><B>Wheelbase</B> — distance between front and rear axles in inches. Default is 159″.</P>
            <P><B>Track width</B> — distance between left and right wheel centres in inches. Default is 71″.</P>
            <P>Both defaults are set for the Winnebago Travato.</P>
          </Sec>
          <Sec title="Tips">
            <P><B>Add to Home Screen:</B> In Safari tap Share → Add to Home Screen. The app works offline after the first load.</P>
            <P><B>Numbers seem backwards?</B> Your phone may be rotated 180°. Make sure the top of the phone points toward the front of the van, then tap Calibrate.</P>
          </Sec>
          <button onClick={onClose} className="w-full py-4 rounded-2xl font-mono font-bold text-sm tracking-widest uppercase text-gold" style={{border:'1px solid #e8c84a',background:'transparent',marginTop:4}}>✕ Close Help</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [screen,setScreen]=useState('home');
  const [tilt,setTilt]=useState(0);
  const [pitch,setPitch]=useState(0);
  const [live,setLive]=useState(false);
  const [held,setHeld]=useState(false);
  const [showHelp,setShowHelp]=useState(false);
  const [showCal,setShowCal]=useState(false);
  const [calOk,setCalOk]=useState(false);
  const [inc,setInc]=useState(0);
  const [wb,setWb]=useState(159);
  const [tw,setTw]=useState(71);
  const smT=useRef(0),smP=useRef(0),rawG=useRef(0),rawB=useRef(0);
  const calT=useRef(parseFloat(storeGet('bl_calT')||'0'));
  const calP=useRef(parseFloat(storeGet('bl_calP')||'0'));
  const liveR=useRef(false),heldR=useRef(false);
  useEffect(()=>{heldR.current=held;},[held]);

  const onOrient=useCallback(e=>{
    if(e.beta===null&&e.gamma===null)return;
    if(!liveR.current){liveR.current=true;setLive(true);}
    if(heldR.current)return;
    rawG.current=e.gamma??0; rawB.current=e.beta??0;
    const rt=-rawG.current-calT.current, rp=-rawB.current-calP.current;
    smT.current+=ALPHA*(rt-smT.current); smP.current+=ALPHA*(rp-smP.current);
    setTilt(+smT.current.toFixed(2)); setPitch(+smP.current.toFixed(2));
  },[]);

  const attach=useCallback(()=>{
    window.addEventListener('deviceorientation',onOrient,true);
    setTimeout(()=>{if(!liveR.current)setScreen('nosensor');},3500);
  },[onOrient]);

  const boot=useCallback(()=>{
    setScreen('main');
    if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
      DeviceOrientationEvent.requestPermission().then(s=>{if(s==='granted')attach();else setScreen('denied');}).catch(()=>attach());
    }else{attach();}
  },[attach]);

  function doCalibrate(){
    setShowCal(false);
    calT.current=-rawG.current; calP.current=-rawB.current;
    storeSet('bl_calT',calT.current); storeSet('bl_calP',calP.current);
    smT.current=0; smP.current=0; setTilt(0); setPitch(0);
    setHeld(false); heldR.current=false;
    setCalOk(true); setTimeout(()=>setCalOk(false),1600);
  }

  const t=tilt,p=pitch;
  const isLevel=Math.abs(t)<THRESH&&Math.abs(p)<THRESH;
  const h={
    FL:(wb/2)*Math.tan(p*Math.PI/180)+(tw/2)*Math.tan(t*Math.PI/180),
    FR:(wb/2)*Math.tan(p*Math.PI/180)-(tw/2)*Math.tan(t*Math.PI/180),
    RL:-(wb/2)*Math.tan(p*Math.PI/180)+(tw/2)*Math.tan(t*Math.PI/180),
    RR:-(wb/2)*Math.tan(p*Math.PI/180)-(tw/2)*Math.tan(t*Math.PI/180),
  };
  const minH=Math.min(...Object.values(h)), span=Math.max(...Object.values(h))-minH||1;
  const wheels=['FL','FR','RL','RR'].map(k=>{
    const riseRaw=h[k]-minH, rise=riseRaw<RISE_NOISE?0:riseRaw;
    const disp=parseFloat(fmtRise(rise,inc)), frac=riseRaw/span;
    const state=disp<0.005?'zero':frac<0.55?'low':'high';
    return{k,rise,disp,cm:(disp*2.54).toFixed(1),state};
  });

  const ARENA=118, aCtr=ARENA/2, MAX=aCtr-14, SC=aCtr/26;
  const bx=Math.max(-MAX,Math.min(MAX,t*SC)), by=Math.max(-MAX,Math.min(MAX,p*SC));
  const tCol=Math.abs(t)<THRESH?'#3dffa0':'#e8c84a';
  const pCol=Math.abs(p)<THRESH?'#3dffa0':'#e8c84a';

  if(screen==='home') return <HomeScreen onNext={()=>setScreen('perm')}/>;
  if(screen==='perm') return <PermScreen onBoot={boot}/>;
  if(screen==='denied') return(
    <div className="fixed inset-0 bg-bg flex flex-col items-center justify-center gap-5 p-8 text-center">
      <div className="text-4xl">🔒</div>
      <p className="text-warn font-disp font-bold text-xl">Motion Access Denied</p>
      <p className="text-muted text-sm leading-relaxed max-w-xs">Go to <strong className="text-ink">Settings › Safari › Motion &amp; Orientation Access</strong>, enable it, then reload.</p>
    </div>
  );
  if(screen==='nosensor') return(
    <div className="fixed inset-0 bg-bg flex flex-col items-center justify-center gap-5 p-8 text-center">
      <div className="text-4xl">⚠️</div>
      <p className="text-warn font-disp font-bold text-xl">No Sensor Data</p>
      <p className="text-muted text-sm leading-relaxed max-w-xs">Open this URL directly in <strong className="text-ink">Safari</strong> and tap <strong className="text-ink">Allow</strong> on the motion prompt.</p>
      <button onClick={()=>setScreen('perm')} className="px-8 py-3 rounded-2xl font-mono text-sm uppercase tracking-wide text-gold" style={{border:'1px solid #e8c84a'}}>Try Again</button>
    </div>
  );

  return(
    <>
      {showHelp&&<HelpScreen onClose={()=>setShowHelp(false)}/>}
      {showCal&&<CalModal onConfirm={doCalibrate} onCancel={()=>setShowCal(false)}/>}
      <div className="relative z-10 flex flex-col bg-bg" style={{height:'100dvh',maxWidth:430,margin:'0 auto',paddingBottom:'env(safe-area-inset-bottom,0px)'}}>

        {/* Header */}
        <header className="flex items-center justify-between px-5 flex-shrink-0 border-b border-rim" style={{paddingTop:10,paddingBottom:8}}>
          <div className="font-disp font-black text-xl tracking-wide text-gold" style={{textShadow:'0 0 18px rgba(232,200,74,.3)'}}>
            Buffy<span className="font-light text-ink">Level</span>
            <span className="font-mono font-normal text-dim ml-2" style={{fontSize:'.6rem',letterSpacing:'.06em'}}>{VERSION}</span>
          </div>
          <div className="flex items-center gap-2">
            <span className="font-mono uppercase tracking-widest text-muted border border-rim rounded-md px-2 py-0.5" style={{fontSize:'.68rem'}}>{live?'live':'waiting'}</span>
            <div className="w-2 h-2 rounded-full transition-all duration-500" style={{background:live?'#3dffa0':'#6e90a8',boxShadow:live?'0 0 8px #3dffa0':'none'}}/>
          </div>
        </header>

        {/* Angle strip */}
        <div className="grid bg-panel border-b border-rim flex-shrink-0" style={{gridTemplateColumns:'1fr 1px 1fr'}}>
          {[['Tilt °',t,tCol],['Pitch °',p,pCol]].map(([lbl,val,col],i)=>(
            <React.Fragment key={lbl}>
              {i===1&&<div style={{background:'#1d3050'}}/>}
              <div className="flex flex-col items-center acell-py" style={{padding:'6px 0 5px',gap:1}}>
                <span className="font-mono uppercase tracking-widest text-muted" style={{fontSize:'.72rem'}}>{lbl}</span>
                <span className="font-mono leading-none" style={{fontSize:'1.4rem',color:col,transition:'color .2s'}}>{fmtDeg(val)}</span>
              </div>
            </React.Fragment>
          ))}
        </div>

        {/* Bubble row */}
        <div className="flex flex-row items-center flex-shrink-0 bwrap-py" style={{padding:'6px 10px'}}>
          <div className="flex-1 flex items-center justify-center min-w-0">
            <div style={{background:'rgba(255,179,64,.15)',border:'1px solid #ffb340',borderRadius:10,padding:'6px 10px',fontFamily:'"SF Mono",Menlo,Monaco,monospace',fontSize:'.68rem',letterSpacing:'.07em',color:'#ffb340',textTransform:'uppercase',opacity:held?1:0,transition:'opacity .3s',pointerEvents:'none',whiteSpace:'normal',textAlign:'center',maxWidth:78,lineHeight:1.5}}>❚❚ Reading<br/>Held</div>
          </div>
          <div className="flex flex-col items-center flex-shrink-0" style={{gap:3}}>
            <div className="relative rounded-full flex-shrink-0 arena-sz" style={{width:ARENA,height:ARENA,background:'radial-gradient(circle at 42% 36%, #162238, #07090f)',border:isLevel?'2px solid #1a4030':'2px solid #1d3050',boxShadow:isLevel?'0 0 20px rgba(61,255,160,.14)':'none',transition:'border-color .4s, box-shadow .4s'}}>
              <ArenaSVG size={ARENA}/>
              <div style={{position:'absolute',width:28,height:28,borderRadius:'50%',transform:'translate(-50%,-50%)',left:aCtr+bx,top:aCtr+by,pointerEvents:'none',background:isLevel?'radial-gradient(circle at 35% 30%, rgba(61,255,160,.95), rgba(0,130,70,.45))':'radial-gradient(circle at 35% 30%, rgba(232,200,74,.95), rgba(130,90,0,.4))',border:`2px solid ${isLevel?'#3dffa0':'#e8c84a'}`,boxShadow:isLevel?'0 0 16px rgba(61,255,160,.65)':'0 0 10px rgba(232,200,74,.5)',transition:'left .1s ease-out, top .1s ease-out, background .3s, border-color .3s, box-shadow .3s'}}/>
            </div>
            <div className="font-mono text-ok" style={{fontSize:'.63rem',letterSpacing:'.18em',height:13,opacity:isLevel?1:0,transition:'opacity .4s',animation:isLevel?'lvlpulse 2s ease infinite':'none'}}>✦ &nbsp;LEVEL&nbsp; ✦</div>
          </div>
          <div className="flex-1 min-w-0"/>
        </div>

        {/* Wheel dimension inputs */}
        <div className="grid gap-1.5 flex-shrink-0 dims-py" style={{gridTemplateColumns:'1fr 1fr',padding:'4px 14px'}}>
          {[['Wheelbase',wb,setWb],['Track width',tw,setTw]].map(([lbl,val,set])=>(
            <div key={lbl} className="bg-panel rounded-2xl dcard-py" style={{border:'1px solid #1d3050',padding:'6px 10px'}}>
              <div className="font-mono uppercase tracking-wide text-muted mb-1" style={{fontSize:'.7rem'}}>{lbl}</div>
              <div className="flex items-center gap-1.5">
                <input type="number" value={val} inputMode="decimal" min="1" onChange={e=>set(+e.target.value||0)}
                  className="flex-1 bg-bg text-gold font-mono text-base text-center rounded-xl outline-none min-w-0"
                  style={{border:'1px solid #1d3050',padding:'5px',width:0}}/>
                <span className="text-muted" style={{fontSize:'.7rem'}}>in</span>
              </div>
            </div>
          ))}
        </div>

        {/* Wheel grid */}
        <div className="flex flex-col flex-1 min-h-0 overflow-y-auto" style={{padding:'0 14px 5px',gap:4}}>
          <div className="flex items-center gap-1.5" style={{padding:'2px 2px'}}>
            <span className="font-mono text-muted whitespace-nowrap" style={{fontSize:'.68rem',letterSpacing:'.06em'}}>Show rise:</span>
            <div className="flex gap-1">
              {[['Exact',0],['½″',0.5],['1″',1]].map(([lbl,val])=>(
                <button key={lbl} onClick={()=>setInc(val)} className="font-mono rounded-lg cursor-pointer"
                  style={{padding:'5px 13px',fontSize:'.74rem',letterSpacing:'.05em',border:`1px solid ${inc===val?'#e8c84a':'#1d3050'}`,background:'transparent',color:inc===val?'#e8c84a':'#6e90a8',transition:'border-color .1s, color .1s'}}>{lbl}</button>
              ))}
            </div>
          </div>
          <div className="flex justify-between font-mono uppercase tracking-wide text-dim" style={{fontSize:'.68rem',padding:'0 2px'}}>
            <span>◀ driver</span><span>↑ front</span><span>passenger ▶</span>
          </div>
          <div className="grid flex-1" style={{gridTemplateColumns:'1fr 1fr',gap:5}}>
            {wheels.map(({k,rise,disp,cm,state})=>{
              const s=CARD[state];
              return(
                <div key={k} className="rounded-2xl flex flex-col items-center justify-center relative overflow-hidden wcard-py"
                     style={{background:s.bg,border:`1px solid ${s.border}`,padding:'7px 6px 6px',transition:'background .25s, border-color .25s'}}>
                  <div className="absolute top-0 left-0 right-0 rounded-t-2xl" style={{height:3,background:s.bar,boxShadow:s.glow,transition:'background .25s, box-shadow .25s'}}/>
                  <span className="font-mono uppercase tracking-wide mt-1" style={{fontSize:'.68rem',color:s.lbl}}>{WL[k]}</span>
                  <span className="font-disp font-bold leading-none wrise-sz" style={{fontSize:'1.85rem',color:s.rise,transition:'color .25s'}}>{fmtRise(rise,inc)}</span>
                  <span className="font-mono uppercase tracking-wide" style={{fontSize:'.68rem',color:s.lbl}}>inches</span>
                  <span className="font-mono" style={{fontSize:'.73rem',color:'#6e90a8'}}>{cm} cm</span>
                </div>
              );
            })}
          </div>
          <div className="flex justify-between font-mono uppercase tracking-wide text-dim" style={{fontSize:'.68rem',padding:'0 2px'}}>
            <span>◀ driver</span><span>↓ rear</span><span>passenger ▶</span>
          </div>
        </div>

        {/* Action buttons */}
        <div className="flex gap-1.5 flex-shrink-0 act-py" style={{padding:'4px 14px 8px'}}>
          {[
            {id:'freeze',label:held?'▶ Resume':'⏸ Freeze',active:held,aColor:'#e8c84a',onClick:()=>setHeld(h=>!h)},
            {id:'cal',label:calOk?'✓ Saved':'⦿ Calibrate',active:calOk,aColor:'#3dffa0',onClick:()=>setShowCal(true)},
            {id:'help',label:'? Help',active:false,aColor:'#e8c84a',onClick:()=>setShowHelp(true)},
          ].map(btn=>(
            <button key={btn.id} onClick={btn.onClick}
              className="flex-1 font-mono uppercase rounded-2xl cursor-pointer act-btn"
              style={{background:'transparent',padding:'13px 4px',fontSize:'.74rem',letterSpacing:'.06em',border:`1px solid ${btn.active?btn.aColor:'#1d3050'}`,color:btn.active?btn.aColor:'#9dc0d8',transition:'border-color .15s, color .15s'}}>
              {btn.label}
            </button>
          ))}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(r=>console.log('SW registered:',r.scope))
      .catch(e=>console.warn('SW failed:',e));
  });
}
</script>
</body>
</html>

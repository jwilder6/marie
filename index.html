<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buffy RV Leveling</title>
<link rel="manifest" href="manifest.json">
<style>
body{margin:0;font-family:Arial;background:#0b0f14;color:#fff;height:100vh;overflow:hidden}
#app{display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;height:100vh}

h2{margin:5px;color:#00ffcc}

.level{width:150px;height:150px;border:2px solid #00ffcc;border-radius:50%;position:relative}
.bubble{width:22px;height:22px;background:#00ffcc;border-radius:50%;position:absolute;transform:translate(-50%,-50%)}
.target{position:absolute;top:50%;left:50%;width:6px;height:6px;background:#fff;border-radius:50%;transform:translate(-50%,-50%)}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:220px}
.box{border:1px solid #00ffcc;border-radius:8px;padding:6px;text-align:center;font-size:0.8em}

button{padding:6px;margin:2px;background:#007aff;border:none;color:#fff;border-radius:6px}
.stable{color:#00ffcc}.unstable{color:#ff5555}
</style>
</head>

<body>
<div id="app">

<h2>Buffy RV Leveling</h2>

<div>
<button onclick="start()">Start</button>
<button onclick="calibrate()">Set Level</button>
</div>

<div class="level">
<div class="bubble" id="bubble"></div>
<div class="target"></div>
</div>

<div class="grid">
<div class="box" id="fl">FL</div>
<div class="box" id="fr">FR</div>
<div class="box" id="rl">RL</div>
<div class="box" id="rr">RR</div>
</div>

<div id="stability" class="unstable">Unstable</div>

</div>

<script>
let pitch=0, roll=0, offP=0, offR=0;
let lastVals=[];

function start(){
 if (typeof DeviceOrientationEvent.requestPermission==='function'){
  DeviceOrientationEvent.requestPermission().then(p=>{
   if(p==='granted') window.addEventListener('deviceorientation',update);
  });
 } else window.addEventListener('deviceorientation',update);
}

function calibrate(){offP=pitch;offR=roll;}

function update(e){
 pitch=(e.beta||0)-offP;
 roll=(e.gamma||0)-offR;

 updateBubble();
 updateWheels();
 checkStability();
}

function updateBubble(){
 let x=Math.max(-55,Math.min(55,(roll/45)*55));
 let y=Math.max(-55,Math.min(55,(pitch/45)*55));
 bubble.style.left=75+x+'px';
 bubble.style.top=75+y+'px';
}

function updateWheels(){
 let pr=pitch*Math.PI/180, rr=roll*Math.PI/180;
 let wb=159, tr=70;

 let front=Math.tan(pr)*(wb/2);
 let rear=-front;
 let left=Math.tan(rr)*(tr/2);
 let right=-left;

 let FL=front+left;
 let FR=front+right;
 let RL=rear+left;
 let RR=rear+right;

 let min=Math.min(FL,FR,RL,RR);

 fl.innerHTML=`FL<br>${format(FL-min)}`;
 fr.innerHTML=`FR<br>${format(FR-min)}`;
 rl.innerHTML=`RL<br>${format(RL-min)}`;
 rr.innerHTML=`RR<br>${format(RR-min)}`;
}

function format(v){return Math.abs(v)<0.2?'0':(v>0?'Raise ':'Lower ')+v.toFixed(1)+' in';}

function checkStability(){
 lastVals.push({p:pitch,r:roll});
 if(lastVals.length>10) lastVals.shift();

 let stable=true;
 for(let i=1;i<lastVals.length;i++){
  if(Math.abs(lastVals[i].p-lastVals[i-1].p)>0.5 || Math.abs(lastVals[i].r-lastVals[i-1].r)>0.5){
    stable=false; break;
  }
 }

 stability.textContent=stable?'Stable':'Unstable';
 stability.className=stable?'stable':'unstable';
}
</script>

<script>
if('serviceWorker' in navigator){
 const sw=new Blob([`
 self.addEventListener('install',e=>{
  e.waitUntil(caches.open('v7').then(c=>c.addAll(['./','./index.html','./manifest.json'])));
 });
 self.addEventListener('fetch',e=>{
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));
 });
 `],{type:'text/javascript'});
 navigator.serviceWorker.register(URL.createObjectURL(sw));
}
</script>

</body>
</html>
